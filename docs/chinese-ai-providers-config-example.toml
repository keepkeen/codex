# Example configuration for Chinese AI model providers
# Copy the relevant sections to your ~/.codex/config.toml

# ============================================================================
# DeepSeek Configuration
# ============================================================================
# Set environment variable: export DEEPSEEK_API_KEY="your-api-key"
# Get your API key from: https://platform.deepseek.com/api_keys

model_provider = "deepseek"
model = "deepseek-chat"

# For reasoning capabilities, use deepseek-reasoner
# model = "deepseek-reasoner"
# model_reasoning_effort = "medium"  # Options: low, medium, high

# Optional: Customize DeepSeek provider settings
# [model_providers.deepseek]
# name = "DeepSeek"
# base_url = "https://api.deepseek.com"
# env_key = "DEEPSEEK_API_KEY"
# wire_api = "responses"

# ============================================================================
# GLM (Zhipu AI) Configuration
# ============================================================================
# Set environment variable: export GLM_API_KEY="your-api-key"
# Get your API key from: https://open.bigmodel.cn/usercenter/apikeys

# model_provider = "glm"
# model = "glm-4-plus"  # Supports image input
# # or use glm-4-flash for faster responses
# # model = "glm-4-flash"

# Optional: Customize GLM provider settings
# [model_providers.glm]
# name = "GLM (Zhipu AI)"
# base_url = "https://open.bigmodel.cn/api/paas/v4"
# env_key = "GLM_API_KEY"
# wire_api = "responses"

# ============================================================================
# Kimi (Moonshot AI) Configuration
# ============================================================================
# Set environment variable: export KIMI_API_KEY="your-api-key"
# Get your API key from: https://platform.moonshot.cn/console/api-keys
# NOTE: Kimi does NOT support parallel tool calls

# model_provider = "kimi"
# model = "kimi-k2.5"

# Optional: Customize Kimi provider settings
# [model_providers.kimi]
# name = "Kimi (Moonshot AI)"
# base_url = "https://api.moonshot.cn/v1"
# env_key = "KIMI_API_KEY"
# wire_api = "responses"

# ============================================================================
# MiniMax Configuration
# ============================================================================
# Set environment variable: export MINIMAX_API_KEY="your-api-key"
# Get your API key from: https://www.minimaxi.com/user-center/basic-information/interface-key
# NOTE: MiniMax M2.7 has 205K context window

# model_provider = "minimax"
# model = "minimax-m2.7"

# Optional: Customize MiniMax provider settings
# [model_providers.minimax]
# name = "MiniMax"
# base_url = "https://api.minimax.chat/v1"
# env_key = "MINIMAX_API_KEY"
# wire_api = "responses"

# ============================================================================
# Memory System Configuration (Optional)
# ============================================================================
# Configure which models to use for the memory system
# If not specified, defaults to OpenAI models

# [memories]
# extract_model = "deepseek-chat"        # Model for extracting memories
# consolidation_model = "deepseek-chat"  # Model for consolidating memories

# ============================================================================
# Profile-based Configuration (Advanced)
# ============================================================================
# You can create different profiles for different providers

# [profiles.deepseek-dev]
# model_provider = "deepseek"
# model = "deepseek-chat"

# [profiles.deepseek-reasoning]
# model_provider = "deepseek"
# model = "deepseek-reasoner"
# model_reasoning_effort = "high"

# [profiles.glm-multimodal]
# model_provider = "glm"
# model = "glm-4-plus"  # Supports images

# [profiles.kimi-long]
# model_provider = "kimi"
# model = "kimi-k2.5"

# [profiles.minimax-ultra]
# model_provider = "minimax"
# model = "minimax-m2.7"  # 205K context

# Then use: codex --profile deepseek-dev
